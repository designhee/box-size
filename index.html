<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일반 포장 박스</title>
  <link rel="stylesheet" href="./box-table.css" />
</head>
<body>
  <main class="page-wrap">
    <section class="catalog-card">
      <header class="catalog-header">
        <div class="title-badge">일반 포장 박스</div>
        <h1 class="catalog-title">가로사이즈 기준표</h1>
        <p class="catalog-contact">
          ⓘ 제품찾기 힘드실때 연락주세요 070-5097-3247 또는 051-831-0044
        </p>

        <div class="upload-box">
          <label for="csvFileInput" class="upload-button">CSV 파일 선택</label>
          <input type="file" id="csvFileInput" accept=".csv,text/csv" />
          <span class="file-name" id="fileName">선택된 파일 없음</span>
        </div>
      </header>

      <div class="table-scroll">
        <table class="product-table">
          <colgroup>
            <col />
            <col />
            <col />
            <col />
            <col />
            <col />
          </colgroup>
          <thead>
            <tr>
              <th>제품명</th>
              <th>사이즈</th>
              <th>판매수</th>
              <th>골(두께)</th>
              <th>제조방식</th>
              <th>택배사</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="6" class="loading">CSV 파일을 선택하면 표가 생성됩니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./box-table-upload.js"></script>
</body>
</html>
